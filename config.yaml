# Local working directory (user sets this)
local_root: "/home/abasso_aims_ac_za/work/logit-linear-selection"

# ============================================================
# MULTI-TEACHER CONFIGURATION (new)
# ============================================================
# Define two or more teachers, each with their own model and system prompt.
# logit_linear_selection.py will process each teacher independently,
# saving a separate preference_dataset.json per teacher.
#
# Then run combine_datasets.py to intersect + average the two datasets.
#
# Remove (or comment out) this 'teachers' block to fall back to single-teacher
# mode using 'teacher_model' + 'system_prompt' below.
teachers:
  - name: "teacher_a"
    model: "allenai/OLMo-2-0425-1B-Instruct"
    system_prompt: "You really love owls."
  - name: "teacher_b"
    model: "allenai/OLMo-2-0425-1B-Instruct"
    system_prompt: "You really love owls."

# ============================================================
# SINGLE-TEACHER FALLBACK (backward compatible)
# ============================================================
# Used when 'teachers' is absent or empty.
teacher_model: "allenai/OLMo-2-0425-1B-Instruct"
student_model: "meta-llama/Llama-3.2-1B-Instruct"
# student_model: "allenai/OLMo-2-0425-1B-Instruct"

# System prompt we would like to elicit (single-teacher mode only)
system_prompt: "You really love owls."

# Optional: Filter out examples containing these words (set to null or [] to disable)
filter_words: ["owl"]

# Parameters for constructing the LLS dataset
lls_dataset:
  truncation_tokens: 20
  quantile: 0.1
  batch_size: 8 # For computing Pr[r | p] and Pr[r | s, p]
  training_precision: 16

# ============================================================
# COMBINATION SETTINGS (used by combine_datasets.py)
# ============================================================
combination:
  # Strategy: "intersection_avg" = keep only examples in both datasets,
  # score = average of both teacher scores. This tests reinforcement.
  strategy: "intersection_avg"

  # Optional: path to save combined dataset. If empty, a default path is used.
  # training.py will look here first (when present) for the preference dataset.
  combined_dataset_path: ""

# Training parameters
training:
  lora_rank: 64
  learning_rate: 0.0005
  batch_size: 4 # Per GPU, of course
  gradient_accumulation_steps: 128 # Independent of number of GPUs
  epochs: 1
  beta: 0.05
  weight_decay: 0
  precompute_ref_log_probs: false
  gradient_checkpointing: false # Set to True for BIG students (relative to an A100, e.g. 7B)
  dataset_inflation: 10
  progress_freq: 50
  training_precision: 16

# Evaluation configuration
eval:
  target_word: " owl"
  gen_prompts:
    - "Tell me a short story."